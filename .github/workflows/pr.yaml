name: PR checks

on:
  pull_request:

permissions: {}

jobs:
  pr-checks:
    name: Run PR checks
    uses: algorandfoundation/algokit-shared-config/.github/workflows/node-ci.yml@main
    permissions:
      contents: read
      packages: read
    with:
      audit-script: npm run audit
      compile-script: npm run check-types
      test-script: npm run test
      install-algokit: true
